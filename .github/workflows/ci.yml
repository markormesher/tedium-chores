# This file is maintained by Tedium - manual edits will be overwritten!
name: CI
"on":
  - push
jobs:
  check-go:
    runs-on: ubuntu-latest
    container:
      image: docker.io/golang:1.26.5
    steps:
      - uses: markormesher/ci-resources/setup@v0.5.0
      - run: ./task deps-go
      - run: ./task lint-go
      - run: ./task test-go
  ci-all:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - check-go
      - img-build-push
    container:
      image: docker.io/busybox:1.37.0
    steps:
      - run: |2
          results=$(grep '"result":' <<<'${{ toJson(needs) }}')
          if echo "$results" | grep -q "failure\|cancelled\|skipped"; then
            echo "One or more jobs failed, were cancelled, or were skipped" >&2
            exit 1
          fi
          echo "All jobs passed"
  img-build-push:
    runs-on: ubuntu-latest
    needs:
      - check-go
    steps:
      - uses: markormesher/ci-resources/setup@v0.5.0
      - run: buildah login ghcr.io -u "${{ github.actor }}" -p "${{ github.token }}"
      - run: ./task imgrefs
      - run: ./task imgbuild
      - run: ./task imgpush
